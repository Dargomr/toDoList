name: CI for To-Do App

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '25.2.1'

      - name: Install Frontend Dependencies
        run: |
          cd frontend
          npm ci  

      - name: Lint Frontend
        run: |
          cd frontend
          npm run 

      - name: Build Frontend
        run: |
          cd frontend
          npm run build 

      - name: Install Backend Dependencies
        run: |
          npm ci

